<gap:target id="cargo-toml">
[workspace]
<gap:target id="workspace-members">
members = [
  <gap:target id="workspace-member-cli">"cli"</gap:target>,
  <gap:target id="workspace-member-core">"core"</gap:target>,
  <gap:target id="workspace-member-utils">"utils"</gap:target>
]
</gap:target>

<gap:target id="package-metadata">
[package]
<gap:target id="package-name">name = "dataforge"</gap:target>
<gap:target id="package-version">version = "0.1.0"</gap:target>
<gap:target id="package-edition">edition = "2021"</gap:target>
<gap:target id="package-description">description = "A data processing CLI and library workspace"</gap:target>
<gap:target id="package-license">license = "MIT OR Apache-2.0"</gap:target>
<gap:target id="package-authors">authors = ["Your Name &lt;you@example.com&gt;"]</gap:target>
<gap:target id="package-repository">repository = "https://github.com/your-org/dataforge"</gap:target>
</gap:target>

<gap:target id="package-targets">
[[bin]]
<gap:target id="binary-name">name = "dataforge"</gap:target>
<gap:target id="binary-path">path = "cli/src/main.rs"</gap:target>

[[lib]]
<gap:target id="library-name">name = "dataforge"</gap:target>
<gap:target id="library-path">path = "core/src/lib.rs"</gap:target>
</gap:target>

<gap:target id="dependencies-block">
[dependencies]
<gap:target id="dependency-clap">clap = { version = "4", features = ["derive"] }</gap:target>
<gap:target id="dependency-serde">serde = { version = "1", features = ["derive"] }</gap:target>
<gap:target id="dependency-tokio">tokio = { version = "1", features = ["rt-multi-thread", "macros"] }</gap:target>
<gap:target id="dependency-anyhow">anyhow = "1"</gap:target>
<gap:target id="dependency-tracing">tracing = "0.1"</gap:target>
<gap:target id="dependency-reqwest">reqwest = { version = "0.12", features = ["json", "rustls-tls"] }</gap:target>
</gap:target>

<gap:target id="dev-dependencies-block">
[dev-dependencies]
<gap:target id="dev-dependency-criterion">criterion = "0.5"</gap:target>
<gap:target id="dev-dependency-tempfile">tempfile = "3"</gap:target>
<gap:target id="dev-dependency-mockito">mockito = "1"</gap:target>
</gap:target>

<gap:target id="features-block">
[features]
<gap:target id="feature-default">default = ["full"]</gap:target>
<gap:target id="feature-full">full = ["clap", "serde", "tokio", "anyhow", "tracing", "reqwest"]</gap:target>
<gap:target id="feature-minimal">minimal = []</gap:target>
</gap:target>

<gap:target id="profile-release-block">
[profile.release]
<gap:target id="release-lto">lto = "thin"</gap:target>
<gap:target id="release-strip">strip = true</gap:target>
</gap:target>
</gap:target>