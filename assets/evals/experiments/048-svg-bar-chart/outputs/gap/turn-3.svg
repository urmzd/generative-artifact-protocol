<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="chart-title chart-desc">
  <gap:target id="svg-root">
    <title id="chart-title"><gap:target id="chart-title-text">Monthly Revenue 2024 vs 2023</gap:target></title>
    <desc id="chart-desc"><gap:target id="chart-desc-text">A responsive SVG bar chart showing monthly revenue data for 2024 with target line, grid lines, axis ticks, value labels, and legend.</gap:target></desc>

    <defs>
      <gap:target id="defs-block">
        <linearGradient id="bar-gradient" x1="0" y1="0" x2="0" y2="1">
          <gap:target id="bar-gradient-stops">
            <stop offset="0%" stop-color="#4f83ff" />
            <stop offset="100%" stop-color="#1f4fbf" />
          </gap:target>
        </linearGradient>
        <linearGradient id="target-gradient" x1="0" y1="0" x2="1" y2="0">
          <gap:target id="target-gradient-stops">
            <stop offset="0%" stop-color="#ffb347" />
            <stop offset="100%" stop-color="#ff7a18" />
          </gap:target>
        </linearGradient>
        <style>
          <gap:target id="chart-styles">
            .bg { fill: #ffffff; }
            .axis { stroke: #2d3748; stroke-width: 2; shape-rendering: crispEdges; }
            .grid { stroke: #e2e8f0; stroke-width: 1; shape-rendering: crispEdges; }
            .tick { stroke: #2d3748; stroke-width: 1.5; shape-rendering: crispEdges; }
            .label { fill: #2d3748; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
            .title { fill: #1a202c; font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; }
            .value { fill: #1a202c; font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 600; }
            .legend-text { fill: #2d3748; font-family: Arial, Helvetica, sans-serif; font-size: 13px; }
            .bar { rx: 6; ry: 6; }
          </gap:target>
        </style>
      </gap:target>
    </defs>

    <rect class="bg" x="0" y="0" width="1000" height="600" />

    <g transform="translate(80, 50)">
      <gap:target id="chart-block">
        <text class="title" x="420" y="10" text-anchor="middle"><gap:target id="chart-title-visible">Monthly Revenue 2024Total: $4.2M (+18% YoY)</gap:target></text>

        <g transform="translate(0, 30)">
          <gap:target id="plot-area">
            <g id="grid-lines">
              <gap:target id="grid-lines-list">
                <line class="grid" x1="0" y1="420" x2="840" y2="420" />
                <line class="grid" x1="0" y1="336" x2="840" y2="336" />
                <line class="grid" x1="0" y1="252" x2="840" y2="252" />
                <line class="grid" x1="0" y1="168" x2="840" y2="168" />
                <line class="grid" x1="0" y1="84" x2="840" y2="84" />
                <line class="grid" x1="0" y1="0" x2="840" y2="0" />
              </gap:target>
            </g>

            <g id="axes">
              <gap:target id="axes-block">
                <line class="axis" x1="0" y1="0" x2="0" y2="420" />
                <line class="axis" x1="0" y1="420" x2="840" y2="420" />
              </gap:target>
            </g>

            <g id="y-axis-ticks">
              <gap:target id="y-axis-ticks-list">
                <g transform="translate(0, 420)">
                  <line class="tick" x1="-6" y1="0" x2="0" y2="0" />
                  <text class="label" x="-12" y="5" text-anchor="end">$0</text>
                </g>
                <g transform="translate(0, 336)">
                  <line class="tick" x1="-6" y1="0" x2="0" y2="0" />
                  <text class="label" x="-12" y="5" text-anchor="end">$100K</text>
                </g>
                <g transform="translate(0, 252)">
                  <line class="tick" x1="-6" y1="0" x2="0" y2="0" />
                  <text class="label" x="-12" y="5" text-anchor="end">$200K</text>
                </g>
                <g transform="translate(0, 168)">
                  <line class="tick" x1="-6" y1="0" x2="0" y2="0" />
                  <text class="label" x="-12" y="5" text-anchor="end">$300K</text>
                </g>
                <g transform="translate(0, 84)">
                  <line class="tick" x1="-6" y1="0" x2="0" y2="0" />
                  <text class="label" x="-12" y="5" text-anchor="end">$400K</text>
                </g>
                <g transform="translate(0, 0)">
                  <line class="tick" x1="-6" y1="0" x2="0" y2="0" />
                  <text class="label" x="-12" y="5" text-anchor="end">$500K</text>
                </g>
              </gap:target>
            </g>

            <g id="bars">
              <gap:target id="bars-list">
                <g transform="translate(20, 0)">
                  <rect class="bar" x="0" y="317" width="42" height="103" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="309" text-anchor="middle"><gap:target id="bar-jan-value">$123K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-jan-label">Jan</gap:target></text>
                </g>
                <g transform="translate(88, 0)">
                  <rect class="bar" x="0" y="292" width="42" height="128" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="284" text-anchor="middle"><gap:target id="bar-feb-value">$152K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-feb-label">Feb</gap:target></text>
                </g>
                <g transform="translate(156, 0)">
                  <rect class="bar" x="0" y="266" width="42" height="154" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="258" text-anchor="middle"><gap:target id="bar-mar-value">$425K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-mar-label">Mar</gap:target></text>
                </g>
                <g transform="translate(224, 0)">
                  <rect class="bar" x="0" y="241" width="42" height="179" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="233" text-anchor="middle"><gap:target id="bar-apr-value">$213K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-apr-label">Apr</gap:target></text>
                </g>
                <g transform="translate(292, 0)">
                  <rect class="bar" x="0" y="224" width="42" height="196" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="216" text-anchor="middle"><gap:target id="bar-may-value">$233K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-may-label">May</gap:target></text>
                </g>
                <g transform="translate(360, 0)">
                  <rect class="bar" x="0" y="191" width="42" height="229" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="183" text-anchor="middle"><gap:target id="bar-jun-value">$272K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-jun-label">Jun</gap:target></text>
                </g>
                <g transform="translate(428, 0)">
                  <rect class="bar" x="0" y="174" width="42" height="246" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="166" text-anchor="middle"><gap:target id="bar-jul-value">$380K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-jul-label">Jul</gap:target></text>
                </g>
                <g transform="translate(496, 0)">
                  <rect class="bar" x="0" y="140" width="42" height="280" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="132" text-anchor="middle"><gap:target id="bar-aug-value">$333K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-aug-label">Aug</gap:target></text>
                </g>
                <g transform="translate(564, 0)">
                  <rect class="bar" x="0" y="132" width="42" height="288" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="124" text-anchor="middle"><gap:target id="bar-sep-value">$342K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-sep-label">Sep</gap:target></text>
                </g>
                <g transform="translate(632, 0)">
                  <rect class="bar" x="0" y="97" width="42" height="323" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="89" text-anchor="middle"><gap:target id="bar-oct-value">$385K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-oct-label">Oct</gap:target></text>
                </g>
                <g transform="translate(700, 0)">
                  <rect class="bar" x="0" y="63" width="42" height="357" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="55" text-anchor="middle"><gap:target id="bar-nov-value">$425K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-nov-label">Nov</gap:target></text>
                </g>
                <g transform="translate(768, 0)">
                  <rect class="bar" x="0" y="29" width="42" height="391" fill="url(#bar-gradient)" />
                  <text class="value" x="21" y="21" text-anchor="middle"><gap:target id="bar-dec-value">$465K</gap:target></text>
                  <text class="label" x="21" y="445" text-anchor="middle"><gap:target id="bar-dec-label">Dec</gap:target></text>
                </g>
              </gap:target>
            </g>

            <g id="target-line">
              <gap:target id="target-block">
                <line x1="0" y1="168" x2="840" y2="168" stroke="url(#target-gradient)" stroke-width="3" stroke-dasharray="8 6" />
                <text class="label" x="840" y="160" text-anchor="end" fill="#c05621"><gap:target id="target-label">Target: $300K</gap:target></text>
              </gap:target>
            </g>

            <g id="legend" transform="translate(650, -10)">
              <gap:target id="legend-block">
                <rect x="0" y="0" width="18" height="18" rx="4" fill="url(#bar-gradient)" />
                <text class="legend-text" x="26" y="14"><gap:target id="legend-revenue-text">Revenue</gap:target></text>
                <line x1="110" y1="9" x2="140" y2="9" stroke="url(#target-gradient)" stroke-width="3" stroke-dasharray="8 6" />
                <text class="legend-text" x="148" y="14"><gap:target id="legend-target-text">Target</gap:target></text>
              </gap:target>
            </g>
          </gap:target>
        </g>
      </gap:target>
    </g>
  </gap:target>
</svg>