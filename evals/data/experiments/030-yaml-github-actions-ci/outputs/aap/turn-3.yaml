<aap:target id="workflow-root">
name: CI/CD Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: <aap:target id="concurrency-group">${{ github.workflow }}-${{ github.ref }}</aap:target>
  cancel-in-progress: true

jobs:
  <aap:target id="lint-job">
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
    <aap:target id="security-scan-job">
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm audit --audit-level=high
      - uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  </aap:target>

</aap:target>

  <aap:target id="test-job">  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        job-type: [unit, e2e]
        node-version: [<aap:target id="node-versions">18, 20</aap:target>]
        exclude:
          - job-type: e2e
            node-version: 18
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: testdb
          POSTGRES_PASSWORD: password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
        if: matrix.job-type == 'e2e'
      - run: npm run test:coverage
        if: matrix.job-type == 'unit'
      - run: npm run test:e2e
        if: matrix.job-type == 'e2e'
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/testdb
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts-${{ matrix.job-type }}-${{ matrix.node-version }}
          path: |
            coverage/
            playwright-report/
</aap:target>]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.node-version }}
          path: coverage/
  </aap:target>

  <aap:target id="build-job">
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
  </aap:target>

  <aap:target id="deploy-job">  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: vercel/actions/deploy@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          production: <aap:target id="prod-trigger">${{ github.ref == 'refs/heads/main' }}</aap:target></aap:target>
  </aap:target>
</aap:target>