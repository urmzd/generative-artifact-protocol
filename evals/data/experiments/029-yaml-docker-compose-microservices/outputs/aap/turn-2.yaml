<aap:target id="docker-compose-root">
version: "3.8"

services:
  <aap:target id="api-gateway">
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - auth
      - user
      - order
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 30s
  </aap:target>

  <aap:target id="auth-service">
  auth:
    build: ./auth-service
    environment:
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
  </aap:target>

  <aap:target id="user-service">
  user:
    build: ./user-service
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/users
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  </aap:target>

  <aap:target id="order-service">
  order:
    build: ./order-service
    environment:
      REDIS_URL: redis://cache:6379
    depends_on:
      - cache
    healthcheck:
      test: ["CMD", "go", "test", "-v", "./health"]
  </aap:target>

  <aap:target id="notification-service">
  notification:
    build: ./notification-service
    environment:
      RABBITMQ_URL: amqp://guest:guest@broker:5672
    depends_on:
      - broker
    <aap:target id="monitoring-service">
  monitoring:
    image: prom/prometheus:v2.45.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - gateway
      - auth
      - user
      - order
      - notification
  </aap:target>

</aap:target>

  <aap:target id="infrastructure-layer">  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s</aap:target>

networks:
  default:
    name: microservices-network

volumes:
  <aap:target id="persistence-volumes">
  db-data:
  redis-data:
  </aap:target>
</aap:target>