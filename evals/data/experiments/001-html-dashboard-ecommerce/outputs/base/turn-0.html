<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
:root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
nav { background: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.container { padding: 2rem; max-width: 1200px; margin: auto; }
.card { background: #fff; border-radius: 8px; padding: 1.5rem; border: 1px solid var(--border); margin-bottom: 2rem; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); }
.badge { padding: 0.25rem 0.5rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
.status-active { background: #dcfce7; color: #166534; }
.form-group { margin-bottom: 1rem; }
input, select { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; }
.btn { background: var(--primary); color: #fff; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>

<aap:section id="nav">
<nav>
    <div style="font-weight:bold; font-size: 1.5rem;">AdminCore</div>
    <div style="display:flex; align-items:center; gap: 1rem;">
        <span>Dashboard</span><span>Reports</span>
        <div style="width:32px; height:32px; background:#ddd; border-radius:50%;"></div>
        <button class="btn">Sign Out</button>
    </div>
</nav>
</aap:section>

<div class="container">
<aap:section id="stats">
<div class="grid">
    <div class="card"><h3>Total Revenue</h3><p style="font-size:1.5rem; font-weight:bold">$54,232</p><small style="color:green">↑ 12%</small></div>
    <div class="card"><h3>Orders</h3><p style="font-size:1.5rem; font-weight:bold">1,204</p><small style="color:green">↑ 5%</small></div>
    <div class="card"><h3>Customers</h3><p style="font-size:1.5rem; font-weight:bold">8,432</p><small style="color:green">↑ 2%</small></div>
    <div class="card"><h3>Conversion</h3><p style="font-size:1.5rem; font-weight:bold">3.2%</p><small style="color:red">↓ 0.5%</small></div>
</div>
</aap:section>

<aap:section id="products-table">
<div class="card">
    <h2>Products</h2>
    <table id="prodTable">
        <thead><tr><th>Name</th><th>SKU</th><th>Price</th><th>Stock</th><th>Category</th><th>Status</th></tr></thead>
        <tbody>
            <script>
                for(let i=1; i<=60; i++) {
                    document.write(`<tr><td>Product ${i}</td><td>SKU-${1000+i}</td><td>$${(Math.random()*100).toFixed(2)}</td><td>${Math.floor(Math.random()*500)}</td><td>Category A</td><td><span class="badge status-active">Active</span></td></tr>`);
                }
            </script>
        </tbody>
    </table>
</div>
</aap:section>

<aap:section id="orders-table">
<div class="card">
    <h2>Recent Orders</h2>
    <table id="ordTable">
        <thead><tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
        <tbody>
            <script>
                for(let i=1; i<=40; i++) {
                    document.write(`<tr><td>#ORD-${5000+i}</td><td>Customer ${i}</td><td>$${(Math.random()*200).toFixed(2)}</td><td>2023-10-${i%28+1}</td><td><span class="badge status-active">Delivered</span></td></tr>`);
                }
            </script>
        </tbody>
    </table>
</div>
</aap:section>

<aap:section id="settings">
<div class="card">
    <h2>Account Settings</h2>
    <div class="form-group"><label>Display Name</label><input type="text" value="John Doe"></div>
    <div class="form-group"><label>Email</label><input type="email" value="admin@example.com"></div>
    <div class="form-group"><label><input type="checkbox" checked> Receive Email Notifications</label></div>
    <button class="btn">Save Changes</button>
</div>
</aap:section>
</div>

</body>
</html>
