name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Verify benchmarks compile
        run: cargo bench --no-run

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libdrm2 \
            libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2t64 libxshmfence1

      - name: Test (HTML → PDF)
        run: |
          echo "<h1>ci</h1>" > /tmp/test.html
          ./target/debug/artifact-generator /tmp/test.html --output /tmp/test.pdf &
          PID=$!
          # Poll for PDF instead of fixed sleep
          for i in $(seq 1 30); do
            if [ -s /tmp/test.pdf ]; then
              echo "PASS: PDF is non-empty (after ${i}s)"
              kill $PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          kill $PID 2>/dev/null || true
          echo "FAIL: PDF missing or empty after 30s"
          exit 1

  python:
    name: Python benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --project tools

      - name: Run offline benchmarks
        run: uv run --project tools ag-bench
